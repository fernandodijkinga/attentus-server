{% extends "base.html" %}
{% block title %}Weather{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
.controls {
  display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px;
}
.ctrl-field { display: flex; flex-direction: column; gap: 5px; }
.ctrl-field label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); font-family: var(--mono);
}
.ctrl-field select, .ctrl-field input {
  min-width: 140px; width: auto;
}
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:900px) { .chart-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--surf); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-card canvas { display: block; width: 100% !important; height: 200px !important; }
.chart-heading {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px; font-family: var(--mono);
}
.chart-heading span { color: var(--text); font-size: 18px; font-weight: 700; margin-right: 6px; font-family: var(--sans); }
.stat-row { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
.stat-item { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.stat-item b { color: var(--text2); }
.loading-overlay {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--muted); font-family: var(--mono); font-size: 13px;
  grid-column: 1/-1;
}
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
           border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite;
           margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.full-chart { grid-column: 1 / -1; }
/* ── THI: layout dedicado ───────────────────────────── */
.thi-card {
  padding: 0;
  overflow: hidden;
  border: 1px solid rgba(0, 229, 160, 0.22);
  background: linear-gradient(165deg, rgba(0, 229, 160, 0.06) 0%, var(--surf) 42%);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
}
.thi-shell { display: flex; flex-direction: column; gap: 0; }
.thi-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 20px; flex-wrap: wrap;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.thi-headline { display: flex; gap: 14px; align-items: flex-start; max-width: min(100%, 42rem); }
.thi-icon {
  font-size: 28px; line-height: 1; flex-shrink: 0;
  filter: drop-shadow(0 2px 8px rgba(0, 229, 160, 0.25));
}
.thi-title {
  margin: 0; font-size: 17px; font-weight: 800; letter-spacing: -0.3px; color: #fff;
  font-family: var(--sans);
}
.thi-caption {
  margin: 6px 0 0; font-size: 12px; color: var(--text2); line-height: 1.5; max-width: 48ch;
}
.thi-controls {
  display: flex; flex-direction: column; gap: 6px; min-width: 220px;
  flex-shrink: 0;
}
.thi-controls .thi-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); font-family: var(--mono);
}
.thi-select {
  width: 100%; max-width: 320px;
  padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surf2); color: var(--text);
  font-family: var(--sans); font-size: 13px;
  cursor: pointer;
}
.thi-select:focus {
  outline: none; border-color: rgba(0, 229, 160, 0.45);
  box-shadow: 0 0 0 2px rgba(0, 229, 160, 0.12);
}
.thi-chart-wrap {
  position: relative;
  margin: 0 12px 12px;
  padding: 12px 8px 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  min-height: 288px;
}
.thi-chart-wrap canvas { height: 280px !important; max-height: 42vh; }
.thi-legend {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px 12px;
  margin: 0 20px 14px;
  padding: 0;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
}
.thi-legend .thi-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 8px;
  background: var(--surf2); border: 1px solid var(--border);
  line-height: 1.35;
}
.thi-legend i {
  display: inline-block; width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.1);
}
.thi-footer {
  display: flex; flex-wrap: wrap; align-items: stretch; gap: 14px;
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  background: rgba(7, 13, 20, 0.35);
}
.thi-kpi-grid {
  display: flex; flex-wrap: wrap; gap: 10px; flex: 1; min-width: 200px;
}
.thi-kpi {
  flex: 1; min-width: 88px; max-width: 140px;
  padding: 10px 12px; border-radius: 8px;
  background: var(--surf2); border: 1px solid var(--border);
  text-align: center;
}
.thi-kpi .k {
  display: block; font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--muted); font-family: var(--mono); margin-bottom: 4px;
}
.thi-kpi .v {
  font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent);
}
.thi-last {
  flex: 1; min-width: 220px; max-width: 420px;
  padding: 12px 14px; border-radius: 8px;
  border: 1px solid rgba(0, 229, 160, 0.2);
  background: rgba(0, 229, 160, 0.05);
  font-size: 12px; color: var(--text2); line-height: 1.5;
  align-self: center;
}
.thi-last b { color: #fff; font-family: var(--mono); }
.badge-thi { font-weight: 700; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-family: var(--mono); margin-left: 6px; }
.badge-thi.normal { background: rgba(0, 229, 160, 0.15); color: var(--accent); border: 1px solid rgba(0, 229, 160, 0.25); }
.badge-thi.alert { background: rgba(255, 224, 102, 0.12); color: var(--warn); border: 1px solid rgba(255, 224, 102, 0.22); }
.badge-thi.stress { background: rgba(255, 77, 106, 0.12); color: var(--err); border: 1px solid rgba(255, 77, 106, 0.22); }
.thi-last-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
/* Mini heatmaps THI */
.thi-heatmaps {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 16px 18px;
  border-top: 1px solid var(--border);
  background: rgba(7, 13, 20, 0.25);
}
@media (max-width: 960px) { .thi-heatmaps { grid-template-columns: 1fr; } }
.thi-heatmap-card {
  padding: 14px 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surf2);
}
.thi-mini-h {
  font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted); font-family: var(--mono);
  margin-bottom: 6px;
}
.thi-mini-sub {
  font-size: 11px; color: var(--text2); line-height: 1.45; margin-bottom: 10px; max-width: 52ch;
}
.thi-hm-canvas-wrap {
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #070d14;
}
.thi-hm-canvas-wrap canvas { display: block; max-width: 100%; height: auto !important; }
.thi-hm-scale {
  display: flex; align-items: center; gap: 10px; margin-top: 8px;
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  flex-wrap: wrap;
}
.thi-hm-scale .grad {
  flex: 1; min-width: 120px; height: 8px; border-radius: 4px;
  background: linear-gradient(90deg, #4a90d9 0%, #a8e063 35%, #fff2cc 55%, #ffc000 75%, #ed7d31 88%, #c00000 100%);
  border: 1px solid var(--border);
}
.zone-h-row {
  display: grid;
  grid-template-columns: minmax(100px, 1fr) 1fr auto;
  gap: 8px; align-items: center;
  margin-bottom: 8px; font-size: 11px;
}
.zone-h-row:last-child { margin-bottom: 0; }
.zh-label { color: var(--text2); font-family: var(--mono); line-height: 1.25; }
.zh-bar {
  height: 10px; border-radius: 5px; background: var(--bg);
  border: 1px solid var(--border); overflow: hidden;
}
.zh-bar > i {
  display: block; height: 100%; border-radius: 4px;
  min-width: 2px; transition: width .35s ease;
}
.zh-h { font-family: var(--mono); color: var(--accent); font-weight: 600; font-size: 11px; text-align: right; }
.thi-zone-total {
  margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border);
  font-size: 10px; color: var(--muted); font-family: var(--mono);
}
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">🌡 <span>Weather</span></div>
    <div class="page-sub">Meteorologia + MQ-135 (qualidade do ar) das estações Attentus</div>
  </div>
  <a href="{{ url_for('download_weather') }}" class="btn btn-ghost btn-sm">↓ Exportar CSV</a>
</div>

<!-- FILTROS -->
<div class="controls">
  <div class="ctrl-field">
    <label>Dispositivo</label>
    <select id="sel-device">
      <option value="">Todos</option>
      {% for d in devices %}
      <option value="{{ d }}">{{ d }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="ctrl-field">
    <label>Período</label>
    <select id="sel-hours">
      <option value="6">Últimas 6h</option>
      <option value="24" selected>Últimas 24h</option>
      <option value="72">Últimos 3 dias</option>
      <option value="168">Última semana</option>
      <option value="720">Último mês</option>
    </select>
  </div>
  <button class="btn btn-accent btn-sm" onclick="loadData()">Atualizar</button>
  <div id="last-update" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;align-self:center;text-align:right"></div>
</div>

<!-- CHARTS -->
<div class="chart-grid" id="chart-grid">
  <div class="loading-overlay"><span class="spinner"></span> Carregando dados...</div>
</div>

{% endblock %}

{% block scripts %}
<script>
const THI_ZONES = {{ thi_zones | tojson }};
const THI_THRESHOLDS = {{ thi_thresholds | tojson }};

const THI_CATEGORY_LABELS = {
  calf: 'Bezerras',
  heifer: 'Novilhas',
  low_lactation: 'Baixa lactação',
  high_lactation: 'Alta lactação',
  primiparous_low: 'Primíparas — menor produção',
  primiparous_high: 'Primíparas — alta produção',
  multiparous_low: 'Multíparas — menor produção',
  multiparous_high: 'Multíparas — alta produção',
};

function classifyThiStatus(thi, category) {
  const t = THI_THRESHOLDS[category];
  if (thi == null || !t) return null;
  if (thi < t.normal_max) return 'normal';
  if (thi <= t.alert_max) return 'alert';
  return 'stress';
}

function statusLabelPt(s) {
  if (s === 'normal') return 'Normal';
  if (s === 'alert') return 'Alerta';
  if (s === 'stress') return 'Estresse térmico';
  return '—';
}

const TZ_BR = 'America/Sao_Paulo';

/** Eixos de tempo e tooltips dos gráficos em horário de Brasília (independente do fuso do navegador). */
function applyBrasilTimeAxis(cfg) {
  const brTitle = (ms) => new Date(ms).toLocaleString('pt-BR', {
    timeZone: TZ_BR,
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
  const brTick = (ms) => new Date(ms).toLocaleString('pt-BR', {
    timeZone: TZ_BR, hour: '2-digit', minute: '2-digit',
  });
  cfg.scales = cfg.scales || {};
  cfg.scales.x = cfg.scales.x || {};
  cfg.scales.x.ticks = cfg.scales.x.ticks || {};
  cfg.scales.x.ticks.callback = (val) => brTick(val);
  cfg.plugins = cfg.plugins || {};
  cfg.plugins.tooltip = cfg.plugins.tooltip || {};
  cfg.plugins.tooltip.callbacks = cfg.plugins.tooltip.callbacks || {};
  cfg.plugins.tooltip.callbacks.title = (items) => {
    if (!items || !items.length) return '';
    return brTitle(items[0].parsed.x);
  };
}

/** Fundo THI mais suave para a linha destacar sem competir visualmente. */
function softenThiZones(zones, alpha = 0.22) {
  return zones.map((z) => {
    const m = String(z.rgba || '').match(/rgba\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*,/);
    if (!m) return z;
    return { ...z, rgba: `rgba(${m[1]},${m[2]},${m[3]},${alpha})` };
  });
}

function createThiZonePlugin(zones) {
  return {
    id: 'thiHolsteinZones',
    beforeDatasetsDraw(chart) {
      const y = chart.scales.y;
      const { ctx, chartArea } = chart;
      if (!y || !chartArea) return;
      zones.forEach(z => {
        const p1 = y.getPixelForValue(z.y_min);
        const p2 = y.getPixelForValue(z.y_max);
        const top = Math.min(p1, p2);
        const h = Math.abs(p2 - p1);
        ctx.save();
        ctx.fillStyle = z.rgba;
        ctx.fillRect(chartArea.left, top, chartArea.width, h);
        ctx.restore();
      });
    },
  };
}

const COLORS = {
  temp:  { line:'#00e5a0', bg:'rgba(0,229,160,.08)' },
  lux:   { line:'#ffb84d', bg:'rgba(255,184,77,.08)' },
  press: { line:'#0099ff', bg:'rgba(0,153,255,.06)' },
  hum:   { line:'#cc66ff', bg:'rgba(204,102,255,.07)' },
  rssi:  { line:'#ff4d6a', bg:'rgba(255,77,106,.06)' },
  thi:   { line:'#00e5a0', bg:'rgba(0,229,160,.06)' },
  mq135: { line:'#a8e063', bg:'rgba(168,224,99,.12)' },
  mqppm: { line:'#56ab2f', bg:'rgba(86,171,47,.1)' },
};

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: false },
    tooltip: { backgroundColor:'#0c1820', borderColor:'#1c3040', borderWidth:1,
               titleColor:'#7a9aae', bodyColor:'#cce4f0',
               titleFont:{family:'JetBrains Mono',size:10}, bodyFont:{family:'JetBrains Mono',size:11} }
  },
  scales: {
    x: {
      type: 'time',
      time: { tooltipFormat: 'dd/MM HH:mm', displayFormats:{hour:'HH:mm',day:'dd/MM'} },
      ticks: { color:'#3d5f72', font:{family:'JetBrains Mono',size:9}, maxTicksLimit:8 },
      grid: { color:'#1c3040' }
    },
    y: {
      ticks: { color:'#7a9aae', font:{family:'JetBrains Mono',size:10} },
      grid: { color:'#1c3040' }
    }
  }
};

let charts = {};

function makeDataset(data, key, label, color) {
  return {
    label, data: data.map(r => ({ x: r.received_at, y: r[key] })),
    borderColor: color.line, backgroundColor: color.bg,
    borderWidth: 2, pointRadius: data.length < 100 ? 3 : 0,
    pointBackgroundColor: color.line, tension: .4, fill: true,
  };
}

function computeStats(vals) {
  const valid = vals.filter(v => v != null);
  if (!valid.length) return { min:'—', max:'—', avg:'—' };
  const mn = Math.min(...valid), mx = Math.max(...valid);
  const av = valid.reduce((a,b)=>a+b,0)/valid.length;
  return { min:mn.toFixed(1), max:mx.toFixed(1), avg:av.toFixed(1) };
}

function buildChart(id, data, key, title, unit, colorKey, opts={}) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  if (charts[id]) charts[id].destroy();

  const cfg = JSON.parse(JSON.stringify(CHART_DEFAULTS));
  applyBrasilTimeAxis(cfg);
  if (opts.yMin !== undefined) cfg.scales.y.min = opts.yMin;
  if (opts.yMax !== undefined) cfg.scales.y.max = opts.yMax;

  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { datasets: [makeDataset(data, key, title, COLORS[colorKey])] },
    options: cfg,
  });

  const vals = data.map(r => r[key]);
  const s = computeStats(vals);
  const statEl = document.getElementById(id + '-stats');
  if (statEl) statEl.innerHTML =
    `min <b>${s.min} ${unit}</b> &nbsp; max <b>${s.max} ${unit}</b> &nbsp; avg <b>${s.avg} ${unit}</b>`;
}

function updateThiLatestMeta(data) {
  const cat = document.getElementById('thi-category')?.value || 'calf';
  let last = null;
  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i].thi != null) { last = data[i]; break; }
  }
  const el = document.getElementById('thi-status-line');
  if (!el) return;
  if (!last) {
    el.innerHTML = '<span style="color:var(--muted)">Sem pontos THI no período.</span>';
    return;
  }
  const st = classifyThiStatus(last.thi, cat);
  const badge = st ? `<span class="badge-thi ${st}">${statusLabelPt(st)}</span>` : '';
  const label = THI_CATEGORY_LABELS[cat] || cat;
  el.innerHTML = `
    <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">
      Último ponto · ${label}
    </div>
    <div class="thi-last-row">
      THI <b>${last.thi}</b>
      ${badge}
      ${last.temp_c != null || last.humidity != null ? `<span style="margin-left:8px;color:var(--muted);font-size:11px;font-family:var(--mono)">
        ${last.temp_c != null ? last.temp_c + '°C' : ''}${last.temp_c != null && last.humidity != null ? ' · ' : ''}${last.humidity != null ? last.humidity + '% UR' : ''}
      </span>` : ''}
    </div>`;
}

function parseUtcMs(iso) {
  return new Date(iso).getTime();
}

/** Últimos 7 dias corridos (YYYY-MM-DD em Brasília), do mais antigo ao mais recente. */
function enumerateLast7DaysBr() {
  const out = [];
  const now = Date.now();
  for (let k = 6; k >= 0; k--) {
    const dt = new Date(now - k * 24 * 60 * 60 * 1000);
    out.push(dt.toLocaleDateString('en-CA', { timeZone: TZ_BR }));
  }
  return out;
}

function brHour(iso) {
  const parts = new Intl.DateTimeFormat('en-GB', {
    timeZone: TZ_BR,
    hour: '2-digit',
    hour12: false,
  }).formatToParts(new Date(iso));
  const h = parts.find((p) => p.type === 'hour');
  return h ? parseInt(h.value, 10) : 0;
}

function thiCellColor(avg) {
  if (avg == null || isNaN(avg)) return 'rgba(22, 35, 48, 0.92)';
  const t = Math.max(0, Math.min(1, (avg - 48) / 62));
  const r = Math.round(40 + t * 200);
  const g = Math.round(120 + (1 - t) * 100);
  const b = Math.round(200 - t * 160);
  return `rgb(${r},${g},${b})`;
}

function drawThiTrendHeatmap(thiWeek) {
  const canvas = document.getElementById('thi-canvas-heatmap-trend');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const days = enumerateLast7DaysBr();
  const rows = days.length;
  const cols = 24;
  const acc = {};
  (thiWeek || []).forEach((r) => {
    if (r.thi == null) return;
    const day = new Date(r.received_at).toLocaleDateString('en-CA', {
      timeZone: TZ_BR,
    });
    const hour = brHour(r.received_at);
    const k = `${day}-${hour}`;
    if (!acc[k]) acc[k] = { sum: 0, n: 0 };
    acc[k].sum += Number(r.thi);
    acc[k].n += 1;
  });

  const cw = 12;
  const ch = 20;
  const padL = 42;
  const padT = 16;
  const padB = 12;
  const W = padL + cols * cw + 6;
  const H = padT + rows * ch + padB;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.width = `${W}px`;
  canvas.style.height = `${H}px`;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#070d14';
  ctx.fillRect(0, 0, W, H);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const k = `${days[r]}-${c}`;
      const cell = acc[k];
      const avg = cell && cell.n ? cell.sum / cell.n : null;
      ctx.fillStyle = thiCellColor(avg);
      ctx.fillRect(padL + c * cw, padT + r * ch, cw - 1, ch - 1);
    }
  }

  ctx.font = '10px JetBrains Mono, ui-monospace, monospace';
  ctx.fillStyle = '#7a9aae';
  for (let r = 0; r < rows; r++) {
    ctx.fillText(days[r].slice(5), 4, padT + r * ch + Math.floor(ch / 2) + 4);
  }
  ctx.font = '9px JetBrains Mono, ui-monospace, monospace';
  for (let c = 0; c < cols; c += 3) {
    ctx.fillText(String(c), padL + c * cw, padT - 4);
  }
}

function holsteinBandIndex(thi) {
  if (thi == null || isNaN(thi)) return -1;
  const zs = THI_ZONES;
  for (let i = 0; i < zs.length - 1; i++) {
    if (thi >= zs[i].y_min && thi < zs[i].y_max) return i;
  }
  return zs.length - 1;
}

function computeHoursByHolsteinBand(periodData) {
  const hrs = THI_ZONES.map(() => 0);
  const pts = (periodData || [])
    .filter((r) => r.thi != null)
    .sort((a, b) => parseUtcMs(a.received_at) - parseUtcMs(b.received_at));
  if (pts.length < 2) return { hrs, total: 0, sparse: pts.length };

  for (let i = 0; i < pts.length - 1; i++) {
    const dt =
      (parseUtcMs(pts[i + 1].received_at) - parseUtcMs(pts[i].received_at)) /
      3600000;
    if (dt <= 0 || dt > 72) continue;
    const idx = holsteinBandIndex(pts[i].thi);
    if (idx >= 0) hrs[idx] += dt;
  }
  const total = hrs.reduce((a, b) => a + b, 0);
  return { hrs, total, sparse: pts.length };
}

function shortZoneLabel(z) {
  const lab = z.label || '';
  return lab.length > 44 ? `${lab.slice(0, 42)}…` : lab;
}

function renderZoneHoursBars(periodData) {
  const wrap = document.getElementById('thi-zone-hours-bars');
  const tot = document.getElementById('thi-zone-hours-total');
  if (!wrap) return;
  const { hrs, total, sparse } = computeHoursByHolsteinBand(periodData);
  if (sparse < 2) {
    wrap.innerHTML =
      '<p style="font-size:12px;color:var(--muted)">São necessárias pelo menos duas amostras com THI no período para estimar horas por faixa.</p>';
    if (tot) tot.textContent = '';
    return;
  }
  let html = '';
  THI_ZONES.forEach((z, i) => {
    const h = hrs[i] || 0;
    const pct = total > 0 ? (h / total) * 100 : 0;
    const safe = String(z.label || '').replace(/"/g, '&quot;');
    html += `<div class="zone-h-row">
      <span class="zh-label" title="${safe}">${shortZoneLabel(z)}</span>
      <div class="zh-bar"><span style="display:block;width:${pct.toFixed(1)}%;min-width:${pct > 0 ? 3 : 0}px;background:${z.hex};height:100%;border-radius:4px"></span></div>
      <span class="zh-h">${h.toFixed(1)} h</span>
    </div>`;
  });
  wrap.innerHTML = html;
  if (tot) {
    tot.textContent = `Total aproximado entre amostras: ${total.toFixed(1)} h · ${sparse} pontos THI no período filtrado.`;
  }
}

function buildThiMiniHeatmaps(periodData, thiWeek) {
  drawThiTrendHeatmap(thiWeek || []);
  renderZoneHoursBars(periodData);
}

function buildThiChart(data) {
  const canvas = document.getElementById('ch-thi');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (charts['ch-thi']) charts['ch-thi'].destroy();

  const thiVals = data.map(r => r.thi).filter(v => v != null);
  if (!thiVals.length) return;

  let yMin = Math.floor((Math.min(...thiVals) - 8) / 5) * 5;
  let yMax = Math.ceil((Math.max(...thiVals) + 8) / 5) * 5;
  yMin = Math.max(45, yMin);
  yMax = Math.min(130, Math.max(yMax, 95));

  const cfg = JSON.parse(JSON.stringify(CHART_DEFAULTS));
  applyBrasilTimeAxis(cfg);
  cfg.scales.y.min = yMin;
  cfg.scales.y.max = yMax;
  cfg.plugins.legend = { display: false };
  cfg.plugins.tooltip.callbacks.label = function (ctx) {
    const raw = ctx.raw;
    const row = raw && raw._row;
    const v = ctx.parsed && ctx.parsed.y != null ? ctx.parsed.y : (raw && raw.y);
    if (!row) return ` THI: ${v}`;
    let t = ` THI: ${v}`;
    if (row.temp_c != null) t += ` · ${row.temp_c}°C`;
    if (row.humidity != null) t += ` · ${row.humidity}% UR`;
    return t;
  };
  cfg.scales.y.grid = { color: 'rgba(28, 48, 64, 0.55)' };
  cfg.scales.x.grid = { color: 'rgba(28, 48, 64, 0.45)' };
  cfg.scales.y.title = {
    display: true,
    text: 'Índice THI',
    color: '#5a7a8c',
    font: { family: 'JetBrains Mono', size: 10 },
  };
  cfg.animation = { duration: 450 };

  const ds = data.map(r => ({
    x: r.received_at,
    y: r.thi != null ? r.thi : null,
    _row: r,
  }));

  const zonePlugin = createThiZonePlugin(softenThiZones(THI_ZONES, 0.24));

  charts['ch-thi'] = new Chart(ctx, {
    plugins: [zonePlugin],
    type: 'line',
    data: {
      datasets: [{
        label: 'THI',
        data: ds,
        borderColor: COLORS.thi.line,
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        pointRadius: data.length < 120 ? 3 : 0,
        pointHoverRadius: 5,
        pointBackgroundColor: COLORS.thi.line,
        pointBorderColor: '#070d14',
        pointBorderWidth: 1,
        tension: 0.35,
        fill: false,
        spanGaps: false,
      }],
    },
    options: cfg,
  });

  const s = computeStats(thiVals);
  const statEl = document.getElementById('ch-thi-stats');
  if (statEl) {
    statEl.innerHTML = `
      <div class="thi-kpi"><span class="k">Mín</span><span class="v">${s.min}</span></div>
      <div class="thi-kpi"><span class="k">Máx</span><span class="v">${s.max}</span></div>
      <div class="thi-kpi"><span class="k">Média</span><span class="v">${s.avg}</span></div>
    `;
  }
  updateThiLatestMeta(data);
}

async function loadData() {
  const device = document.getElementById('sel-device').value;
  const hours  = document.getElementById('sel-hours').value;
  const grid   = document.getElementById('chart-grid');

  grid.innerHTML = '<div class="loading-overlay"><span class="spinner"></span> Carregando dados...</div>';

  const params = new URLSearchParams({ hours });
  if (device) params.append('device', device);

  const res  = await fetch('/api/weather/data?' + params);
  const data = await res.json();

  if (!data.length) {
    grid.innerHTML = '<div class="loading-overlay">Nenhum dado encontrado para este filtro.</div>';
    return;
  }

  const hasThi = data.some((r) => r.thi != null);
  let thiWeekForHeat = [];
  if (hasThi) {
    const pw = new URLSearchParams({ hours: '168' });
    if (device) pw.append('device', device);
    try {
      const rw = await fetch('/api/weather/data?' + pw.toString());
      thiWeekForHeat = await rw.json();
    } catch (e) {
      thiWeekForHeat = [];
    }
  }

  const hasHum  = data.some(r => r.humidity != null);
  const hasMqRaw = data.some(r => r.mq135_raw != null);
  const hasMqPpm = data.some(r => r.mq135_ppm != null);

  grid.innerHTML = `
    ${hasThi ? `
    <div class="chart-card full-chart thi-card" id="thi-block">
      <div class="thi-shell">
        <header class="thi-header">
          <div class="thi-headline">
            <span class="thi-icon" aria-hidden="true">🐄</span>
            <div>
              <h2 class="thi-title">THI — conforto térmico</h2>
              <p class="thi-caption">Índice temperatura–umidade (referência Holstein). O fundo do gráfico mostra as faixas ambientais de risco; a linha verde é o THI medido. O estado (normal / alerta / estresse) depende do lote selecionado.</p>
            </div>
          </div>
          <div class="thi-controls">
            <span class="thi-label">Lote / categoria</span>
            <select id="thi-category" class="thi-select">
              <option value="calf" selected>Bezerras</option>
              <option value="heifer">Novilhas</option>
              <option value="low_lactation">Baixa lactação</option>
              <option value="high_lactation">Alta lactação</option>
              <option value="primiparous_low">Primíparas — menor produção</option>
              <option value="primiparous_high">Primíparas — alta produção</option>
              <option value="multiparous_low">Multíparas — menor produção</option>
              <option value="multiparous_high">Multíparas — alta produção</option>
            </select>
          </div>
        </header>
        <div class="thi-chart-wrap">
          <canvas id="ch-thi" height="280"></canvas>
        </div>
        <div class="thi-legend" id="thi-legend"></div>
        <footer class="thi-footer">
          <div class="thi-kpi-grid" id="ch-thi-stats"></div>
          <div class="thi-last" id="thi-status-line"></div>
        </footer>
        <div class="thi-heatmaps" id="thi-heatmaps">
          <div class="thi-heatmap-card">
            <div class="thi-mini-h">Mapa de calor — tendência THI (7 dias)</div>
            <p class="thi-mini-sub">Média do THI por dia (linha) e hora (coluna), horário de Brasília. Células vazias = sem amostra naquela hora.</p>
            <div class="thi-hm-canvas-wrap"><canvas id="thi-canvas-heatmap-trend" width="400" height="220"></canvas></div>
            <div class="thi-hm-scale"><span>Baixo THI</span><div class="grad" aria-hidden="true"></div><span>Alto THI</span></div>
          </div>
          <div class="thi-heatmap-card">
            <div class="thi-mini-h">Horas por faixa ambiental</div>
            <p class="thi-mini-sub">Tempo estimado entre amostras consecutivas no período selecionado (filtro acima), atribuído à faixa Holstein do primeiro ponto de cada intervalo.</p>
            <div id="thi-zone-hours-bars"></div>
            <div class="thi-zone-total" id="thi-zone-hours-total"></div>
          </div>
        </div>
      </div>
    </div>` : ''}
    <div class="chart-card">
      <div class="chart-heading"><span>🌡</span> Temperatura</div>
      <canvas id="ch-temp" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-temp-stats"></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-heading"><span>☀</span> Luminosidade</div>
      <canvas id="ch-lux" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-lux-stats"></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-heading"><span>🌬</span> Pressão atmosférica</div>
      <canvas id="ch-press" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-press-stats"></div></div>
    </div>
    ${hasHum ? `
    <div class="chart-card">
      <div class="chart-heading"><span>💧</span> Umidade relativa</div>
      <canvas id="ch-hum" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-hum-stats"></div></div>
    </div>` : ''}
    ${hasMqRaw ? `
    <div class="chart-card">
      <div class="chart-heading"><span>🌫</span> MQ-135 — leitura bruta</div>
      <canvas id="ch-mq135" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-mq135-stats"></div></div>
    </div>` : ''}
    ${hasMqPpm ? `
    <div class="chart-card">
      <div class="chart-heading"><span>🧪</span> MQ-135 — estimativa (ppm)</div>
      <canvas id="ch-mq135-ppm" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-mq135-ppm-stats"></div></div>
    </div>` : ''}
    <div class="chart-card">
      <div class="chart-heading"><span>📶</span> RSSI (sinal WiFi)</div>
      <canvas id="ch-rssi" height="200"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-rssi-stats"></div></div>
    </div>
    <div class="chart-card full-chart">
      <div class="chart-heading"><span>⛰</span> Altitude estimada</div>
      <canvas id="ch-alt" height="160"></canvas>
      <div class="stat-row"><div class="stat-item" id="ch-alt-stats"></div></div>
    </div>
  `;

  requestAnimationFrame(() => {
    const leg = document.getElementById('thi-legend');
    if (leg) {
      leg.innerHTML = THI_ZONES.map(z =>
        `<div class="thi-chip"><i style="background:${z.hex}" title=""></i><span>${z.label}</span></div>`
      ).join('');
    }
    const tc = document.getElementById('thi-category');
    if (tc) tc.onchange = () => updateThiLatestMeta(data);

    if (hasThi) {
      buildThiChart(data);
      buildThiMiniHeatmaps(data, thiWeekForHeat);
    }

    buildChart('ch-temp',  data, 'temp_c',    'Temperatura', '°C',  'temp');
    buildChart('ch-lux',   data, 'lux',        'Luminosidade','lx',  'lux');
    buildChart('ch-press', data, 'press_hpa',  'Pressão',     'hPa', 'press');
    if (hasHum)
      buildChart('ch-hum', data, 'humidity',   'Umidade',     '%',   'hum', { yMin: 0, yMax: 100 });
    if (hasMqRaw)
      buildChart('ch-mq135', data, 'mq135_raw', 'MQ-135', 'ADC', 'mq135');
    if (hasMqPpm)
      buildChart('ch-mq135-ppm', data, 'mq135_ppm', 'ppm', 'ppm', 'mqppm');
    buildChart('ch-rssi', data, 'rssi',       'RSSI',        'dBm', 'rssi');
    buildChart('ch-alt',   data, 'alt_m',      'Altitude',    'm',   'press');
  });

  const now = new Date().toLocaleTimeString('pt-BR', { timeZone: TZ_BR });
  document.getElementById('last-update').textContent =
    `${data.length} pontos · atualizado ${now} · horário de Brasília`;
}

// Carga inicial
loadData();
// Auto-refresh a cada 60s
setInterval(loadData, 60000);
</script>
{% endblock %}
